<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINTRANS // Binary Code Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff88;
    --green-dim: #00cc6a;
    --green-glow: rgba(0, 255, 136, 0.15);
    --green-border: rgba(0, 255, 136, 0.3);
    --bg: #020c06;
    --bg-panel: #040f08;
    --bg-card: #071410;
    --text: #c8ffd4;
    --text-dim: #4a7a5a;
    --red: #ff4466;
    --amber: #ffcc00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* Noise texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.4;
    z-index: 999;
  }

  /* Floating binary background */
  #binary-rain {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }

  .rain-col {
    position: absolute;
    top: -100%;
    font-size: 11px;
    color: var(--green);
    opacity: 0.18;
    animation: rain linear infinite;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 2px;
    writing-mode: vertical-lr;
    white-space: nowrap;
  }

  @keyframes rain {
    to { transform: translateY(200vh); }
  }

  /* Layout */
  .container {
    position: relative;
    z-index: 10;
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeDown 0.8s ease both;
  }

  .header-eyebrow {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--green);
    text-shadow:
      0 0 20px rgba(0,255,136,0.8),
      0 0 60px rgba(0,255,136,0.3),
      0 0 100px rgba(0,255,136,0.1);
    line-height: 1.1;
  }

  .header-sub {
    margin-top: 14px;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  .header-sub span {
    color: var(--green);
  }

  /* Mode Toggle */
  .mode-toggle {
    display: flex;
    background: var(--bg-panel);
    border: 1px solid var(--green-border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 32px;
    animation: fadeUp 0.8s 0.2s ease both;
  }

  .mode-btn {
    flex: 1;
    padding: 16px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    text-transform: uppercase;
  }

  .mode-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--green);
    transform: scaleX(0);
    transition: transform 0.2s;
    box-shadow: 0 0 8px var(--green);
  }

  .mode-btn.active {
    color: var(--green);
    background: var(--green-glow);
  }

  .mode-btn.active::after {
    transform: scaleX(1);
  }

  .mode-btn:hover:not(.active) {
    color: var(--text);
  }

  /* Panel */
  .panel {
    background: var(--bg-card);
    border: 1px solid var(--green-border);
    border-radius: 6px;
    overflow: hidden;
    animation: fadeUp 0.8s 0.3s ease both;
    box-shadow:
      0 0 40px rgba(0,255,136,0.04),
      inset 0 1px 0 rgba(0,255,136,0.1);
  }

  .panel-header {
    padding: 14px 24px;
    background: rgba(0,255,136,0.05);
    border-bottom: 1px solid var(--green-border);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .panel-body {
    padding: 28px 24px;
  }

  /* Input area */
  .input-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .char-count {
    font-size: 10px;
    color: var(--text-dim);
    transition: color 0.2s;
  }

  .char-count.warn { color: var(--amber); }

  textarea {
    width: 100%;
    background: var(--bg-panel);
    border: 1px solid var(--green-border);
    border-radius: 4px;
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    padding: 16px;
    resize: none;
    outline: none;
    line-height: 1.7;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-height: 120px;
    caret-color: var(--green);
  }

  textarea::placeholder {
    color: var(--text-dim);
    opacity: 0.5;
  }

  textarea:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.08), 0 0 20px rgba(0,255,136,0.05);
  }

  textarea.error {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(255,68,102,0.08);
    color: var(--red);
  }

  .error-msg {
    margin-top: 8px;
    font-size: 11px;
    color: var(--red);
    letter-spacing: 1px;
    min-height: 16px;
    transition: opacity 0.2s;
  }

  /* Translate button */
  .translate-btn {
    width: 100%;
    margin-top: 20px;
    padding: 18px;
    background: transparent;
    border: 1px solid var(--green);
    border-radius: 4px;
    color: var(--green);
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(0,255,136,0.1);
  }

  .translate-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--green);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: -1;
  }

  .translate-btn:hover {
    color: var(--bg);
    box-shadow: 0 0 30px rgba(0,255,136,0.4);
    text-shadow: none;
  }

  .translate-btn:hover::before {
    transform: translateX(0);
  }

  .translate-btn:active {
    transform: scale(0.99);
  }

  .translate-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 28px 0;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 3px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--green-border);
  }

  /* Output area */
  .output-wrapper {
    position: relative;
  }

  .output-box {
    width: 100%;
    background: rgba(0,255,136,0.03);
    border: 1px solid var(--green-border);
    border-radius: 4px;
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 16px 52px 16px 16px;
    line-height: 1.8;
    min-height: 100px;
    word-break: break-all;
    white-space: pre-wrap;
    transition: all 0.3s;
    position: relative;
  }

  .output-box.empty {
    color: var(--text-dim);
    opacity: 0.4;
    font-style: italic;
  }

  .output-box.has-result {
    box-shadow: 0 0 20px rgba(0,255,136,0.08);
    border-color: rgba(0,255,136,0.5);
  }

  .copy-btn {
    position: absolute;
    top: 10px; right: 10px;
    background: none;
    border: 1px solid var(--green-border);
    border-radius: 3px;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 5px 10px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .copy-btn:hover {
    color: var(--green);
    border-color: var(--green);
    background: var(--green-glow);
  }

  .copy-btn.copied {
    color: var(--green);
    border-color: var(--green);
    background: var(--green-glow);
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 24px;
    margin-top: 20px;
    padding: 14px 16px;
    background: rgba(0,255,136,0.03);
    border: 1px solid var(--green-border);
    border-radius: 4px;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-dim);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.3s;
  }

  .stats-bar.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .stat {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .stat-val {
    color: var(--green);
    font-size: 13px;
    font-weight: bold;
  }

  /* Clear btn */
  .clear-btn {
    margin-top: 12px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color 0.2s;
  }

  .clear-btn:hover { color: var(--red); }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes glitch {
    0%, 100% { transform: translate(0); }
    20% { transform: translate(-2px, 1px); }
    40% { transform: translate(2px, -1px); }
    60% { transform: translate(-1px, 2px); }
    80% { transform: translate(1px, -2px); }
  }

  .glitch {
    animation: glitch 0.3s ease;
  }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 56px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    animation: fadeUp 0.8s 0.5s ease both;
  }

  footer span { color: var(--green); }

  /* Bit flip animation for output */
  @keyframes bitReveal {
    0% { opacity: 0; transform: scaleY(0); }
    100% { opacity: 1; transform: scaleY(1); }
  }

  .result-char {
    display: inline-block;
    animation: bitReveal 0.05s ease both;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    padding: 6px 12px;
    background: var(--green);
    color: var(--bg);
    font-size: 11px;
    border-radius: 3px;
    pointer-events: none;
    z-index: 2000;
    opacity: 0;
    transition: opacity 0.2s;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
  }

  .tooltip.show { opacity: 1; }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--green-border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div id="binary-rain"></div>

<div class="container">
  <header>
    <div class="header-eyebrow">// system online</div>
    <h1>BINTRANS</h1>
    <div class="header-sub">Binary Code Translator <span>v2.0</span></div>
  </header>

  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-encode" onclick="setMode('encode')">
      TEXT → BINARY
    </button>
    <button class="mode-btn" id="btn-decode" onclick="setMode('decode')">
      BINARY → TEXT
    </button>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="dot"></div>
      <span id="panel-title">ENCODE // TEXT TO BINARY</span>
    </div>
    <div class="panel-body">

      <div class="input-label">
        <span id="input-label-text">INPUT TEXT</span>
        <span class="char-count" id="char-count">0 chars</span>
      </div>
      <textarea
        id="input-area"
        rows="4"
        placeholder="Type something to encode..."
        oninput="handleInput()"
        onkeydown="handleKeydown(event)"
        spellcheck="false"
      ></textarea>
      <div class="error-msg" id="error-msg"></div>

      <button class="translate-btn" id="translate-btn" onclick="translate()">
        TRANSLATE
      </button>

      <div class="divider">OUTPUT</div>

      <div class="output-wrapper">
        <div class="output-box empty" id="output-box">
          Awaiting input...
        </div>
        <button class="copy-btn" id="copy-btn" onclick="copyOutput()">COPY</button>
      </div>

      <div class="stats-bar" id="stats-bar">
        <div class="stat">
          <span>CHARS</span>
          <span class="stat-val" id="stat-chars">—</span>
        </div>
        <div class="stat">
          <span>BITS</span>
          <span class="stat-val" id="stat-bits">—</span>
        </div>
        <div class="stat">
          <span>BYTES</span>
          <span class="stat-val" id="stat-bytes">—</span>
        </div>
        <div class="stat">
          <span>MODE</span>
          <span class="stat-val" id="stat-mode">—</span>
        </div>
      </div>

      <div style="text-align:right">
        <button class="clear-btn" onclick="clearAll()">[ clear ]</button>
      </div>

    </div>
  </div>

  <footer>
    <span>//</span> ASCII ENCODING &nbsp;·&nbsp; UTF-8 COMPATIBLE &nbsp;·&nbsp; <span>8-BIT</span> GROUPING
  </footer>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
  let mode = 'encode';
  let outputText = '';
  let animTimeout = null;

  // === Binary Rain ===
  const rainContainer = document.getElementById('binary-rain');
  const cols = Math.floor(window.innerWidth / 18);
  for (let i = 0; i < cols; i++) {
    const col = document.createElement('div');
    col.className = 'rain-col';
    col.style.left = (i * 18) + 'px';
    col.style.animationDuration = (8 + Math.random() * 16) + 's';
    col.style.animationDelay = (-Math.random() * 20) + 's';
    col.style.fontSize = (9 + Math.random() * 4) + 'px';
    let bits = '';
    for (let j = 0; j < 60; j++) bits += (Math.random() > 0.5 ? '1' : '0');
    col.textContent = bits;
    rainContainer.appendChild(col);
  }

  // === Mode Toggle ===
  function setMode(m) {
    mode = m;
    document.getElementById('btn-encode').classList.toggle('active', m === 'encode');
    document.getElementById('btn-decode').classList.toggle('active', m === 'decode');

    const panelTitle = document.getElementById('panel-title');
    const inputLabel = document.getElementById('input-label-text');
    const inputArea = document.getElementById('input-area');

    if (m === 'encode') {
      panelTitle.textContent = 'ENCODE // TEXT TO BINARY';
      inputLabel.textContent = 'INPUT TEXT';
      inputArea.placeholder = 'Type something to encode...';
    } else {
      panelTitle.textContent = 'DECODE // BINARY TO TEXT';
      inputLabel.textContent = 'INPUT BINARY (SPACE-SEPARATED 8-BIT)';
      inputArea.placeholder = '01001000 01100101 01101100 01101100 01101111...';
    }

    clearAll();
  }

  // === Validation ===
  function isValidText(text) {
    return /^[a-zA-Z0-9 ]+$/.test(text);
  }

  function isValidBinary(bin) {
    return /^[01 ]+$/.test(bin);
  }

  // === Encode ===
  function encodeBinary(text) {
    return text.split('').map(c =>
      c.charCodeAt(0).toString(2).padStart(8, '0')
    ).join(' ');
  }

  // === Decode ===
  function decodeBinary(binary) {
    const words = binary.trim().split(/\s+/);
    return words.map(w => {
      const code = parseInt(w, 2);
      if (isNaN(code)) throw new Error(`Invalid binary: ${w}`);
      return String.fromCharCode(code);
    }).join('');
  }

  // === Input handler ===
  function handleInput() {
    const val = document.getElementById('input-area').value;
    const count = val.length;
    const cc = document.getElementById('char-count');
    cc.textContent = count + ' chars';
    cc.classList.toggle('warn', count > 200);

    document.getElementById('input-area').classList.remove('error');
    document.getElementById('error-msg').textContent = '';
  }

  function handleKeydown(e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      translate();
    }
  }

  // === Translate ===
  function translate() {
    const input = document.getElementById('input-area').value.trim();
    const errorEl = document.getElementById('error-msg');
    const inputEl = document.getElementById('input-area');
    const btn = document.getElementById('translate-btn');

    // Clear previous errors
    inputEl.classList.remove('error');
    errorEl.textContent = '';

    if (!input) {
      errorEl.textContent = '⚠ INPUT CANNOT BE EMPTY';
      inputEl.classList.add('error');
      shake(inputEl);
      return;
    }

    if (mode === 'encode') {
      if (!isValidText(input)) {
        errorEl.textContent = '⚠ ONLY LETTERS, DIGITS, AND SPACES ARE ALLOWED';
        inputEl.classList.add('error');
        shake(inputEl);
        return;
      }
      try {
        outputText = encodeBinary(input);
        showOutput(outputText, 'ENCODE');
        updateStats(input.length, outputText.replace(/ /g,'').length, input.length, 'ENCODE');
      } catch(e) {
        errorEl.textContent = '⚠ ENCODING FAILED: ' + e.message;
        inputEl.classList.add('error');
      }
    } else {
      if (!isValidBinary(input)) {
        errorEl.textContent = '⚠ ONLY 0, 1, AND SPACES ARE ALLOWED';
        inputEl.classList.add('error');
        shake(inputEl);
        return;
      }
      try {
        outputText = decodeBinary(input);
        const groups = input.trim().split(/\s+/);
        showOutput(outputText, 'DECODE');
        updateStats(outputText.length, input.replace(/ /g,'').length, groups.length, 'DECODE');
      } catch(e) {
        errorEl.textContent = '⚠ DECODE FAILED: ' + e.message;
        inputEl.classList.add('error');
        return;
      }
    }
  }

  // === Animated Output ===
  function showOutput(text, modeLabel) {
    const box = document.getElementById('output-box');
    box.classList.remove('empty');
    box.classList.add('has-result');
    box.classList.add('glitch');
    setTimeout(() => box.classList.remove('glitch'), 300);

    // Animate character reveal
    if (animTimeout) clearTimeout(animTimeout);
    box.textContent = '';

    const delay = Math.min(20, 800 / text.length);
    let i = 0;
    function addChar() {
      if (i < text.length) {
        box.textContent += text[i];
        i++;
        animTimeout = setTimeout(addChar, delay);
      }
    }
    addChar();
  }

  // === Stats ===
  function updateStats(chars, bits, bytes, modeLabel) {
    document.getElementById('stat-chars').textContent = chars;
    document.getElementById('stat-bits').textContent = bits;
    document.getElementById('stat-bytes').textContent = bytes;
    document.getElementById('stat-mode').textContent = modeLabel;

    const bar = document.getElementById('stats-bar');
    bar.classList.add('visible');
  }

  // === Copy ===
  function copyOutput() {
    if (!outputText) return;
    navigator.clipboard.writeText(outputText).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'COPIED!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'COPY';
        btn.classList.remove('copied');
      }, 1800);
    });
  }

  // === Clear ===
  function clearAll() {
    document.getElementById('input-area').value = '';
    document.getElementById('input-area').classList.remove('error');
    document.getElementById('error-msg').textContent = '';
    document.getElementById('char-count').textContent = '0 chars';
    document.getElementById('char-count').classList.remove('warn');
    document.getElementById('output-box').textContent = 'Awaiting input...';
    document.getElementById('output-box').classList.add('empty');
    document.getElementById('output-box').classList.remove('has-result');
    document.getElementById('stats-bar').classList.remove('visible');
    outputText = '';
    if (animTimeout) clearTimeout(animTimeout);
  }

  // === Shake animation ===
  function shake(el) {
    el.style.animation = 'none';
    requestAnimationFrame(() => {
      el.style.animation = 'glitch 0.3s ease';
      setTimeout(() => el.style.animation = '', 300);
    });
  }

  // === Keyboard shortcut hint ===
  const textarea = document.getElementById('input-area');
  const btn = document.getElementById('translate-btn');
  const isMac = navigator.platform.toLowerCase().includes('mac');
  btn.title = `Translate (${isMac ? '⌘' : 'Ctrl'}+Enter)`;
</script>
</body>
</html>

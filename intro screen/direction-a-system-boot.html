<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; padding: 0; background: #030308; overflow: hidden; height: 100%; }
  canvas { display: block; }
  .label {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    font: 700 11px ui-monospace, monospace; color: rgba(99,102,241,0.7);
    letter-spacing: 0.15em; text-transform: uppercase;
  }
  .replay {
    position: fixed; right: 18px; bottom: 18px; z-index: 100;
    border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.04);
    color: rgba(255,255,255,.7); font: 600 12px ui-sans-serif, sans-serif;
    letter-spacing: .12em; text-transform: uppercase; padding: 10px 16px;
    border-radius: 999px; cursor: pointer;
  }
</style>
</head>
<body>
<div class="label">Direction A — System Boot</div>
<canvas id="c"></canvas>
<button class="replay" onclick="location.reload()">Replay</button>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const clamp01 = v=>clamp(v,0,1);
const lerp = (a,b,t)=>a+(b-a)*t;
const easeOut = t=>1-Math.pow(1-t,3);
const rand = (a,b)=>a+Math.random()*(b-a);

const T = { chaos:0, scanStart:300, converge:2200, snap:4600, hold:4950, warp:5900, reveal:7600, end:7900 };
const TOTAL = T.end;
const CONVERGE_DUR = 1700;

const GRAD_STOPS = [
  [0, [129,140,248]], [0.5,[192,132,252]], [1,[34,211,238]]
];
function gradColor(t){
  t = clamp01(t);
  for (let i=0;i<GRAD_STOPS.length-1;i++){
    const [t0,c0]=GRAD_STOPS[i],[t1,c1]=GRAD_STOPS[i+1];
    if (t>=t0&&t<=t1){ const lt=(t-t0)/(t1-t0); return [lerp(c0[0],c1[0],lt),lerp(c0[1],c1[1],lt),lerp(c0[2],c1[2],lt)]; }
  }
  return GRAD_STOPS[GRAD_STOPS.length-1][1];
}
const blend = (c1,c2,t)=>`rgb(${Math.round(lerp(c1[0],c2[0],t))},${Math.round(lerp(c1[1],c2[1],t))},${Math.round(lerp(c1[2],c2[2],t))})`;

let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1,2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize();
window.addEventListener('resize', resize);

function sampleWordmark(text, count){
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');
  const fontPx = Math.min(W*0.11, 92);
  octx.fillStyle = '#fff';
  octx.font = `900 ${fontPx}px ui-sans-serif, system-ui, sans-serif`;
  octx.textAlign = 'center'; octx.textBaseline = 'middle';
  octx.fillText(text, W/2, H/2);
  const data = octx.getImageData(0,0,W,H).data;
  const pts = [];
  const stride = 2;
  for (let y=0;y<H;y+=stride){
    for (let x=0;x<W;x+=stride){
      if (data[(y*W+x)*4+3] > 128) pts.push({x,y});
    }
  }
  for (let i=pts.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [pts[i],pts[j]]=[pts[j],pts[i]];
  }
  return pts.slice(0,count);
}

const COUNT = Math.min(800, Math.floor((W*H)/700));
let particles=[], targets=[], wmMinX=W/2, wmMaxX=W/2;
let wmMinY=H/2, wmMaxY=H/2;

const RAW_GLYPHS = ['#0042','PENDING','#1187','SYNC','#0291','>>','#0573','ACK','#0918','##'];

function init(){
  targets = sampleWordmark('FanBack', COUNT);
  if (targets.length){
    wmMinX = Math.min(...targets.map(p=>p.x));
    wmMaxX = Math.max(...targets.map(p=>p.x));
    wmMinY = Math.min(...targets.map(p=>p.y));
    wmMaxY = Math.max(...targets.map(p=>p.y));
  }
  const n = targets.length || COUNT;
  particles = [];
  for (let i=0;i<n;i++){
    const tx = targets[i]?.x ?? W/2, ty = targets[i]?.y ?? H/2;
    const span = wmMaxX-wmMinX || 1;
    particles.push({
      x: rand(0,W), y: rand(0,H),
      sx:0, sy:0, started:false,
      gridX: Math.floor(rand(0,W/24))*24,
      gridY: Math.floor(rand(0,H/24))*24,
      tx, ty,
      fc: gradColor((tx-wmMinX)/span),
      activated: false,
      activateAt: ((targets[i]?.y ?? H/2) / H) * 1400 + rand(-100,100),
      delay: rand(0,500),
      sz: rand(1.1,2.6),
      isGlyph: Math.random() < 0.04,
      glyph: RAW_GLYPHS[Math.floor(Math.random()*RAW_GLYPHS.length)],
      flickerPhase: rand(0,Math.PI*2),
    });
  }
}
init();

let sparkles=[];
const burstSparkles = (x,y,n)=>{
  for (let i=0;i<n;i++){
    const a = rand(0,Math.PI*2), v = rand(1,3.5);
    sparkles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:1});
  }
};

let lines=[];
const initLines = ()=>{
  lines=[];
  for (let i=0;i<160;i++) lines.push({a:rand(0,Math.PI*2), r:rand(4,Math.max(W,H)*.6), spd:rand(3,11), len:rand(20,70)});
};

let typedText = '';
const FULL_TEXT = '[ SYSTEM ONLINE ]';
let typeStartTime = null;

function gridBg(opacity){
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.strokeStyle = 'rgba(99,102,241,0.5)';
  ctx.lineWidth = 1;
  const step = 46;
  for (let x=0;x<W;x+=step){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0;y<H;y+=step){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.restore();
}

function vignette(){
  const g = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.25,W/2,H/2,Math.max(W,H)*.75);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.65)');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
}

let startTime = null;

function render(t){
  ctx.fillStyle = '#030308'; ctx.fillRect(0,0,W,H);
  gridBg(0.025);

  const zoom = lerp(1, 1.05, clamp01(t/T.warp));
  ctx.save();
  ctx.translate(W/2,H/2); ctx.scale(zoom,zoom); ctx.translate(-W/2,-H/2);

  if (t < T.warp){
    const scanY = ((t - T.scanStart) % 2400) / 2400 * H;
    const inScanPhase = t < T.converge;

    if (inScanPhase){
      ctx.save();
      ctx.strokeStyle = 'rgba(99,102,241,0.55)';
      ctx.lineWidth = 1.5;
      ctx.shadowColor = 'rgba(99,102,241,0.8)';
      ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.moveTo(0,scanY); ctx.lineTo(W,scanY); ctx.stroke();
      ctx.restore();
    }

    for (const p of particles){
      const startAt = T.converge + p.delay;
      let col, alpha = 1;

      if (t < startAt){
        const flicker = inScanPhase && Math.abs(p.y - scanY) < 80;
        const baseAlpha = flicker ? lerp(0.3, 1, 1 - Math.abs(p.y-scanY)/80) : 0.35;
        col = `rgba(99,140,248,${baseAlpha})`;
        if (p.isGlyph){
          ctx.save();
          ctx.font = '9px ui-monospace, monospace';
          ctx.fillStyle = col;
          ctx.fillText(p.glyph, p.gridX, p.gridY);
          ctx.restore();
        } else {
          ctx.beginPath(); ctx.fillStyle = col;
          ctx.fillRect(p.gridX-1, p.gridY-1, 2.4, 2.4);
        }
      } else {
        if (!p.started){ p.sx = p.gridX; p.sy = p.gridY; p.started = true; }
        const localT = clamp01((t-startAt)/CONVERGE_DUR);
        const ep = easeOut(localT);
        const wx = lerp(p.sx, p.tx, ep);
        const wy = lerp(p.sy, p.ty, ep);
        col = blend([99,140,248], p.fc, localT);

        ctx.save();
        ctx.fillStyle = col.replace('rgb(','rgba(').replace(')',`,${0.85})`);
        if (Math.random() < 0.01){
          ctx.shadowColor = col; ctx.shadowBlur = 6;
        }
        ctx.fillRect(wx-p.sz/2, wy-p.sz/2, p.sz, p.sz);
        ctx.restore();
      }
    }

    if (t >= T.snap && t < T.snap+300){
      burstOnce();
      const fa = 1 - (t-T.snap)/300;
      ctx.save();
      ctx.strokeStyle = `rgba(34,211,238,${fa})`;
      ctx.lineWidth = 2;
      const bx = wmMinX-16, by = wmMinY-16, bw = (wmMaxX-wmMinX)+32, bh=(wmMaxY-wmMinY)+32;
      const sz = 22;
      ctx.beginPath(); ctx.moveTo(bx,by+sz); ctx.lineTo(bx,by); ctx.lineTo(bx+sz,by); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx+bw-sz,by); ctx.lineTo(bx+bw,by); ctx.lineTo(bx+bw,by+sz); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx,by+bh-sz); ctx.lineTo(bx,by+bh); ctx.lineTo(bx+sz,by+bh); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx+bw-sz,by+bh); ctx.lineTo(bx+bw,by+bh); ctx.lineTo(bx+bw,by+bh-sz); ctx.stroke();
      ctx.restore();
    } else if (t >= T.snap+300){
      ctx.save();
      ctx.strokeStyle = 'rgba(34,211,238,0.7)';
      ctx.lineWidth = 1.5;
      const bx = wmMinX-16, by = wmMinY-16, bw = (wmMaxX-wmMinX)+32, bh=(wmMaxY-wmMinY)+32;
      const sz = 22;
      ctx.beginPath(); ctx.moveTo(bx,by+sz); ctx.lineTo(bx,by); ctx.lineTo(bx+sz,by); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx+bw-sz,by); ctx.lineTo(bx+bw,by); ctx.lineTo(bx+bw,by+sz); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx,by+bh-sz); ctx.lineTo(bx,by+bh); ctx.lineTo(bx+sz,by+bh); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx+bw-sz,by+bh); ctx.lineTo(bx+bw,by+bh); ctx.lineTo(bx+bw,by+bh-sz); ctx.stroke();
      ctx.restore();

      if (t >= T.hold){
        if (typeStartTime === null) typeStartTime = t;
        const elapsed = t - typeStartTime;
        const charCount = Math.floor(elapsed/35);
        typedText = FULL_TEXT.slice(0, charCount);
        ctx.save();
        ctx.font = '700 11px ui-monospace, monospace';
        ctx.fillStyle = 'rgba(34,211,238,0.85)';
        ctx.textAlign = 'center';
        ctx.fillText(typedText, W/2, wmMaxY + 36);
        ctx.restore();
      }
    }

    for (let i=sparkles.length-1;i>=0;i--){
      const s = sparkles[i];
      s.x += s.vx; s.y += s.vy; s.life -= 0.025;
      if (s.life <= 0){ sparkles.splice(i,1); continue; }
      ctx.save(); ctx.globalAlpha = clamp01(s.life); ctx.fillStyle = '#fff';
      ctx.fillRect(s.x-0.8, s.y-0.8, 1.6, 1.6); ctx.restore();
    }
  }

  ctx.restore();

  let sparkleFired = false;
  function burstOnce(){
    if (sparkleFired) return;
    sparkleFired = true;
  }

  if (t >= T.warp){
    if (!lines.length) initLines();
    const wp = clamp01((t-T.warp)/(T.reveal-T.warp));
    ctx.save();
    ctx.globalAlpha = wp;
    ctx.translate(W/2,H/2);
    ctx.lineCap = 'round';
    for (const ln of lines){
      ln.r += ln.spd*(1+wp*6);
      if (ln.r > Math.max(W,H)*.8) ln.r = rand(4,30);
      const x1 = Math.cos(ln.a)*ln.r, y1 = Math.sin(ln.a)*ln.r;
      const tailLen = ln.len*(0.5+wp*1.5);
      const x2 = Math.cos(ln.a)*(ln.r-tailLen), y2 = Math.sin(ln.a)*(ln.r-tailLen);
      const b = clamp01(ln.r/(Math.max(W,H)*.5));
      ctx.globalAlpha = wp*b;
      ctx.strokeStyle = b > 0.5 ? `rgba(34,211,238,${0.9})` : `rgba(99,102,241,${0.9})`;
      ctx.lineWidth = 0.8 + b*1.2;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    }
    ctx.restore();
    if (t >= T.reveal-400){
      const fa = clamp01((t-(T.reveal-400))/400);
      ctx.fillStyle = `rgba(255,255,255,${fa})`; ctx.fillRect(0,0,W,H);
    }
  }

  vignette();
  ctx.save(); ctx.globalAlpha = 0.03;
  for (let i=0;i<30;i++) ctx.fillRect(Math.random()*W, Math.random()*H, 1.2, 1.2);
  ctx.restore();

  if (t >= T.reveal){
    const rp = clamp01((t-T.reveal)/(T.end-T.reveal));
    canvas.style.opacity = String(1-rp);
  }
}

function frame(now){
  if (!startTime) startTime = now;
  const t = now - startTime;
  if (t >= TOTAL){ render(TOTAL); return; }
  render(t);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; padding: 0; background: #030308; overflow: hidden; height: 100%; }
  canvas { display: block; }
  .label {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    font: 700 11px ui-monospace, monospace; color: rgba(34,211,238,0.7);
    letter-spacing: 0.15em; text-transform: uppercase;
  }
  .replay {
    position: fixed; right: 18px; bottom: 18px; z-index: 100;
    border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.04);
    color: rgba(255,255,255,.7); font: 600 12px ui-sans-serif, sans-serif;
    letter-spacing: .12em; text-transform: uppercase; padding: 10px 16px;
    border-radius: 999px; cursor: pointer;
  }
</style>
</head>
<body>
<div class="label">Direction B — Signal Lock</div>
<canvas id="c"></canvas>
<button class="replay" onclick="location.reload()">Replay</button>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const clamp01 = v=>clamp(v,0,1);
const lerp = (a,b,t)=>a+(b-a)*t;
const easeOut = t=>1-Math.pow(1-t,3);
const rand = (a,b)=>a+Math.random()*(b-a);

const T = { chaos:0, sweepStart:200, converge:2400, snap:5000, hold:5350, warp:6300, reveal:8000, end:8300 };
const TOTAL = T.end;
const CONVERGE_DUR = 1800;

const GRAD_STOPS = [
  [0, [129,140,248]], [0.5,[192,132,252]], [1,[34,211,238]]
];
function gradColor(t){
  t = clamp01(t);
  for (let i=0;i<GRAD_STOPS.length-1;i++){
    const [t0,c0]=GRAD_STOPS[i],[t1,c1]=GRAD_STOPS[i+1];
    if (t>=t0&&t<=t1){ const lt=(t-t0)/(t1-t0); return [lerp(c0[0],c1[0],lt),lerp(c0[1],c1[1],lt),lerp(c0[2],c1[2],lt)]; }
  }
  return GRAD_STOPS[GRAD_STOPS.length-1][1];
}
const blend = (c1,c2,t)=>`rgb(${Math.round(lerp(c1[0],c2[0],t))},${Math.round(lerp(c1[1],c2[1],t))},${Math.round(lerp(c1[2],c2[2],t))})`;

let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1,2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize();
window.addEventListener('resize', resize);

function sampleWordmark(text, count){
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');
  const fontPx = Math.min(W*0.11, 92);
  octx.fillStyle = '#fff';
  octx.font = `900 ${fontPx}px ui-sans-serif, system-ui, sans-serif`;
  octx.textAlign = 'center'; octx.textBaseline = 'middle';
  octx.fillText(text, W/2, H/2);
  const data = octx.getImageData(0,0,W,H).data;
  const pts = [];
  const stride = 2;
  for (let y=0;y<H;y+=stride){
    for (let x=0;x<W;x+=stride){
      if (data[(y*W+x)*4+3] > 128) pts.push({x,y});
    }
  }
  for (let i=pts.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [pts[i],pts[j]]=[pts[j],pts[i]];
  }
  return pts.slice(0,count);
}

const COUNT = Math.min(700, Math.floor((W*H)/750));
let particles=[], targets=[], wmMinX=W/2, wmMaxX=W/2, wmMinY=H/2, wmMaxY=H/2;
const cx = ()=>W/2, cy=()=>H/2;

function init(){
  targets = sampleWordmark('FanBack', COUNT);
  if (targets.length){
    wmMinX = Math.min(...targets.map(p=>p.x));
    wmMaxX = Math.max(...targets.map(p=>p.x));
    wmMinY = Math.min(...targets.map(p=>p.y));
    wmMaxY = Math.max(...targets.map(p=>p.y));
  }
  const n = targets.length || COUNT;
  particles = [];
  for (let i=0;i<n;i++){
    const tx = targets[i]?.x ?? W/2, ty = targets[i]?.y ?? H/2;
    const span = wmMaxX-wmMinX || 1;
    const a = rand(0, Math.PI*2);
    const r = rand(60, Math.min(W,H)*0.46);
    particles.push({
      x: cx()+Math.cos(a)*r, y: cy()+Math.sin(a)*r,
      blipAngle: a, blipRadius: r,
      sx:0, sy:0, started:false,
      tx, ty,
      fc: gradColor((tx-wmMinX)/span),
      sweepAngle: ((Math.atan2(ty-cy(), tx-cx()) + Math.PI*2) % (Math.PI*2)),
      delay: rand(0,600),
      sz: rand(1.4,3),
      pulsePhase: rand(0,Math.PI*2),
    });
  }
}
init();

let sparkles=[];
const burstSparkles = (x,y,n)=>{
  for (let i=0;i<n;i++){
    const a = rand(0,Math.PI*2), v = rand(1,3.5);
    sparkles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:1});
  }
};

let stars=[];
const initStars = ()=>{
  stars=[];
  for (let i=0;i<200;i++) stars.push({a:rand(0,Math.PI*2), r:rand(4,Math.max(W,H)*.6), spd:rand(2,9)});
};

const firedBeats = new Set();
const once = (key, atT, t, fn)=>{ if (t>=atT && !firedBeats.has(key)){ firedBeats.add(key); fn(); } };

function vignette(){
  const g = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.25,W/2,H/2,Math.max(W,H)*.75);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.65)');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
}

let lockedText = '';
const LOCK_TEXT = 'SIGNAL LOCKED';
let lockTypeStart = null;

let startTime = null;

function render(t){
  ctx.fillStyle = '#03080a'; ctx.fillRect(0,0,W,H);

  const zoom = lerp(1, 1.05, clamp01(t/T.warp));
  ctx.save();
  ctx.translate(W/2,H/2); ctx.scale(zoom,zoom); ctx.translate(-W/2,-H/2);

  if (t < T.warp){
    const sweepAngle = ((t - T.sweepStart) / 1800) * Math.PI * 2;
    const inSweepPhase = t < T.converge;

    if (inSweepPhase){
      ctx.save();
      const grad = ctx.createConicGradient ? ctx.createConicGradient(sweepAngle - Math.PI/2, W/2, H/2) : null;
      if (grad){
        grad.addColorStop(0, 'rgba(34,211,238,0)');
        grad.addColorStop(0.04, 'rgba(34,211,238,0.35)');
        grad.addColorStop(0.08, 'rgba(34,211,238,0)');
        grad.addColorStop(1, 'rgba(34,211,238,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(W/2, H/2, Math.max(W,H), 0, Math.PI*2);
        ctx.fill();
      }

      for (let ring=1;ring<=3;ring++){
        ctx.beginPath();
        ctx.strokeStyle = `rgba(34,211,238,${0.08*ring})`;
        ctx.lineWidth = 1;
        ctx.arc(W/2, H/2, (Math.min(W,H)*0.46/3)*ring, 0, Math.PI*2);
        ctx.stroke();
      }
      ctx.restore();
    }

    for (const p of particles){
      const startAt = T.converge + p.delay;
      let col;

      if (t < startAt){
        const angDiff = Math.abs(((sweepAngle - p.sweepAngle + Math.PI*3) % (Math.PI*2)) - Math.PI);
        const lit = inSweepPhase && angDiff < 0.35;
        const baseAlpha = lit ? lerp(1, 0.3, angDiff/0.35) : 0.25;
        const pulse = 0.7 + 0.3*Math.sin(performance.now()/500 + p.pulsePhase);
        col = `rgba(34,211,238,${baseAlpha*pulse})`;
        ctx.beginPath();
        ctx.fillStyle = col;
        ctx.arc(p.x, p.y, lit ? p.sz*1.8 : p.sz, 0, Math.PI*2);
        ctx.fill();
      } else {
        if (!p.started){ p.sx = p.x; p.sy = p.y; p.started = true; }
        const localT = clamp01((t-startAt)/CONVERGE_DUR);
        const ep = easeOut(localT);
        const wx = lerp(p.sx, p.tx, ep);
        const wy = lerp(p.sy, p.ty, ep);
        col = blend([34,211,238], p.fc, localT);

        ctx.beginPath();
        ctx.fillStyle = col.replace('rgb(','rgba(').replace(')',',0.25)');
        ctx.arc(wx, wy, p.sz*1.9, 0, Math.PI*2); ctx.fill();
        ctx.beginPath();
        ctx.fillStyle = col;
        ctx.arc(wx, wy, p.sz, 0, Math.PI*2); ctx.fill();
      }
    }

    once('sparkle', T.snap, t, ()=>burstSparkles(W/2,H/2,55));
    once('hold-sparkle', T.hold, t, ()=>burstSparkles(W/2,H/2,18));

    for (let i=sparkles.length-1;i>=0;i--){
      const s = sparkles[i];
      s.x += s.vx; s.y += s.vy; s.life -= 0.02;
      if (s.life <= 0){ sparkles.splice(i,1); continue; }
      ctx.save(); ctx.globalAlpha = clamp01(s.life); ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s.x,s.y,1.5,0,Math.PI*2); ctx.fill(); ctx.restore();
    }

    if (t >= T.snap){
      const bx = wmMinX-22, by = wmMinY-22, bw = (wmMaxX-wmMinX)+44, bh=(wmMaxY-wmMinY)+44;
      const cornerLen = 16;
      const drawProgress = clamp01((t-T.snap)/400);

      ctx.save();
      ctx.strokeStyle = 'rgba(34,211,238,0.85)';
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = drawProgress;

      ctx.beginPath(); ctx.moveTo(bx,by+cornerLen); ctx.lineTo(bx,by); ctx.lineTo(bx+cornerLen,by); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx+bw-cornerLen,by); ctx.lineTo(bx+bw,by); ctx.lineTo(bx+bw,by+cornerLen); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx,by+bh-cornerLen); ctx.lineTo(bx,by+bh); ctx.lineTo(bx+cornerLen,by+bh); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx+bw-cornerLen,by+bh); ctx.lineTo(bx+bw,by+bh); ctx.lineTo(bx+bw,by+bh-cornerLen); ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(W/2-12, (by+by+bh)/2); ctx.lineTo(W/2+12,(by+by+bh)/2);
      ctx.moveTo(W/2, (by+by+bh)/2-12); ctx.lineTo(W/2,(by+by+bh)/2+12);
      ctx.stroke();

      ctx.restore();

      if (t >= T.hold){
        if (lockTypeStart === null) lockTypeStart = t;
        const elapsed = t - lockTypeStart;
        const charCount = Math.floor(elapsed/30);
        lockedText = LOCK_TEXT.slice(0, charCount);
        ctx.save();
        ctx.font = '700 11px ui-monospace, monospace';
        ctx.fillStyle = 'rgba(34,211,238,0.9)';
        ctx.textAlign = 'center';
        ctx.fillText(lockedText, W/2, wmMaxY + 42);
        if (lockedText.length === LOCK_TEXT.length){
          const blink = Math.sin(performance.now()/200) > 0;
          if (blink){
            ctx.fillRect(W/2 + ctx.measureText(LOCK_TEXT).width/2 + 4, wmMaxY+34, 7, 12);
          }
        }
        ctx.restore();
      }
    }
  }

  ctx.restore();

  if (t >= T.warp){
    if (!stars.length) initStars();
    const wp = clamp01((t-T.warp)/(T.reveal-T.warp));
    ctx.save();
    ctx.globalAlpha = wp;
    ctx.translate(W/2,H/2);
    ctx.lineCap = 'round';
    for (const st of stars){
      st.r += st.spd*(1+wp*6);
      if (st.r > Math.max(W,H)*.8) st.r = rand(4,30);
      const x1 = Math.cos(st.a)*st.r, y1 = Math.sin(st.a)*st.r;
      const tailLen = st.spd*(2+wp*10);
      const x2 = Math.cos(st.a)*(st.r-tailLen), y2 = Math.sin(st.a)*(st.r-tailLen);
      const b = clamp01(st.r/(Math.max(W,H)*.5));
      ctx.globalAlpha = wp*b;
      ctx.strokeStyle = `hsl(${185+b*55}, 90%, ${70+b*25}%)`;
      ctx.lineWidth = 1+b*2;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    }
    ctx.restore();
    if (t >= T.reveal-400){
      const fa = clamp01((t-(T.reveal-400))/400);
      ctx.fillStyle = `rgba(255,255,255,${fa})`; ctx.fillRect(0,0,W,H);
    }
  }

  vignette();
  ctx.save(); ctx.globalAlpha = 0.035;
  for (let i=0;i<36;i++) ctx.fillRect(Math.random()*W, Math.random()*H, 1.3, 1.3);
  ctx.restore();

  if (t >= T.reveal){
    const rp = clamp01((t-T.reveal)/(T.end-T.reveal));
    canvas.style.opacity = String(1-rp);
  }
}

function frame(now){
  if (!startTime) startTime = now;
  const t = now - startTime;
  if (t >= TOTAL){ render(TOTAL); return; }
  render(t);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
